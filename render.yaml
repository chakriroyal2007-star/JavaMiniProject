services:
  - type: web
    name: amritaclassroom
    env: java
    plan: free
    buildCommand: ./gradlew build -x test
    startCommand: java -jar build/libs/cse-a-classroom-0.0.1-SNAPSHOT.jar
    disk:
      name: classroom-data
      mountPath: /opt/render/project/src/db
      sizeGB: 1
    envVars:
      - key: JAVA_VERSION
        value: 21
