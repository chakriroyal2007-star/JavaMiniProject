<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | CSE A Classroom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="item-card animate-in border-0 shadow-lg">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold">Create Account</h2>
                        <p class="text-muted">Start building your interactive classroom</p>
                    </div>
                    
                    <form id="registerForm">
                        <div class="row g-3">
                            <div class="col-md-6 mb-3">
                                <label class="form-label small fw-bold text-muted">FULL NAME</label>
                                <input type="text" id="reg-name" class="form-control" placeholder="John Doe" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label small fw-bold text-muted">I AM A</label>
                                <select id="reg-role" class="form-select">
                                    <option value="STUDENT">Student</option>
                                    <option value="TEACHER">Teacher</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">EMAIL ADDRESS</label>
                            <input type="email" id="reg-email" class="form-control" placeholder="name@university.edu" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-muted">PASSWORD</label>
                            <input type="password" id="reg-password" class="form-control" placeholder="Create a strong password" required>
                        </div>
                        <button type="submit" class="btn btn-indigo w-100 py-2 mb-3">Register Now</button>
                    </form>
                    
                    <div class="text-center mt-3">
                        <p class="small text-muted">Already registered? <a href="login.html" class="text-primary fw-bold text-decoration-none">Login here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container" style="position: fixed; top: 20px; right: 20px;"></div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('reg-name').value,
                email: document.getElementById('reg-email').value,
                password: document.getElementById('reg-password').value,
                role: document.getElementById('reg-role').value
            };
            
            try {
                const res = await API.register(data);
                showToast("Account created successfully! Redirecting...", "success");
                setTimeout(() => window.location.href = 'login.html', 1500);
            } catch (err) {
                showToast(err, "danger");
            }
        });

        function showToast(msg, type) {
            const container = document.getElementById('toast-container');
            const div = document.createElement('div');
            div.className = `alert alert-${type} shadow-sm border-0 alert-dismissible fade show`;
            div.innerHTML = `${msg} <button class="btn-close" data-bs-dismiss="alert"></button>`;
            container.appendChild(div);
            setTimeout(() => div.remove(), 4000);
        }
    </script>
</body>
</html>
