<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CSE A Classroom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="item-card animate-in">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold">Sign In</h2>
                        <p class="text-muted">Access your classroom dashboard</p>
                    </div>
                    
                    <form action="/auth/login" method="POST">
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">EMAIL ADDRESS</label>
                            <input type="email" name="username" class="form-control" placeholder="Enter your email" required>
                        </div>
                        <div class="mb-4">
                            <div class="d-flex justify-content-between align-items-center">
                                <label class="form-label small fw-bold text-muted">PASSWORD</label>
                            </div>
                            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-indigo w-100 py-2 mb-3">Login</button>
                    </form>
                    
                    <div class="text-center mt-3">
                        <p class="small text-muted">New here? <a href="register.html" class="text-primary fw-bold text-decoration-none">Create an account</a></p>
                        <a href="index.html" class="small text-muted text-decoration-none"><i class="fas fa-arrow-left"></i> Back to main</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
